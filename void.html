<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser jetzheart -->
    <link rel="icon" type="image/png" href="https://jet-6.github.io/wadayawant/jetzheart.png">

    <!-- iOS share preview icon -->
    <link rel="apple-touch-icon" href="https://jet-6.github.io/wadayawant/jetzheart.png">

    <!-- Open Graph -->
    <meta property="og:image" content="https://jet-6.github.io/wadayawant/jetzheart.png">
    <meta property="og:title" content="JETWORLD">
    <meta property="og:description" content="Enter the neon hologram terminal.">
    <meta property="og:url" content="https://jet-6.github.io/wadayawant/">
    <meta property="og:type" content="website">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://jet-6.github.io/wadayawant/jetzheart.png">


<title>THE VOID</title>

<style>
/* --------------------------------------------------
   BASE BACKGROUND — stronger breathing fog
-------------------------------------------------- */
body {
    margin: 0;
    background: #000;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "VT323", monospace;
    color: #00ff66;
    letter-spacing: 0.05em;

    animation:
        voidPulse 5s ease-in-out infinite,
        hologramBurn 7s ease-in-out infinite;

    background: radial-gradient(circle at center,
        rgba(0,255,102,0.10) 0%,
        rgba(0,0,0,1) 80%
    );
    background-size: 180% 180%;
    position: relative;
}

@keyframes voidPulse {
    0%   { background-size: 180% 180%; opacity: 0.9; }
    50%  { background-size: 220% 220%; opacity: 1; }
    100% { background-size: 180% 180%; opacity: 0.9; }
}

/* --------------------------------------------------
   BURNED HOLOGRAM FLICKER
-------------------------------------------------- */
@keyframes hologramBurn {
    0%   { filter: brightness(1) contrast(1); }
    40%  { filter: brightness(1.1) contrast(1.2); }
    50%  { filter: brightness(0.85) contrast(1.4) saturate(1.4); }
    60%  { filter: brightness(1.15) contrast(1); }
    100% { filter: brightness(1) contrast(1); }
}

/* --------------------------------------------------
   EMBER EDGES — neon green → orange glow
-------------------------------------------------- */
#ember-edges {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;

    background:
        /* Green inner glow */
        radial-gradient(circle at center,
            rgba(0,255,102,0.12),
            transparent 70%
        ),

        /* Orange ember outer glow */
        radial-gradient(circle at top left,
            rgba(255,120,0,0.25),
            transparent 60%
        ),
        radial-gradient(circle at top right,
            rgba(255,80,0,0.25),
            transparent 60%
        ),
        radial-gradient(circle at bottom left,
            rgba(255,60,0,0.25),
            transparent 60%
        ),
        radial-gradient(circle at bottom right,
            rgba(255,100,0,0.25),
            transparent 60%
        );

    opacity: 1;
}

/* --------------------------------------------------
   EMBER SPARKS — slow + fast, multidirectional
-------------------------------------------------- */
.spark {
    position: fixed;
    width: 3px;
    height: 3px;
    background: rgba(255,140,0,0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    filter: blur(1px);
    animation: drift var(--duration) linear infinite;
}

@keyframes drift {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--dx), var(--dy)) scale(0.4);
        opacity: 0;
    }
}

/* --------------------------------------------------
   TERMINAL TEXT
-------------------------------------------------- */
#terminal-wrapper {
    display: block;
    width: 100%;
    max-width: 90%;
    z-index: 10;
}

#terminal {
    display: block;
    font-size: 1.2rem;
    white-space: pre-wrap;
    line-height: 1.4;
    opacity: 0;
    animation: fadeIn 2s ease-out forwards;
    animation-delay: 1.5s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* Blinking cursor */
#cursor {
    display: block;
    width: 12px;
    height: 1.2rem;
    background: #00ff66;
    margin-top: 0.2rem;
    animation: blink 1.2s infinite;
    opacity: 0;
    animation-delay: 2s;
    animation-fill-mode: forwards;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%,100% { opacity: 0; }
}

/* --------------------------------------------------
   Hidden message — lower-right whisper
-------------------------------------------------- */
.hidden-message-container {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    z-index: 12;
}

/* Soft reveal + drift */
@keyframes softRevealDrift {
    0% {
        opacity: 0;
        transform: translate(14px, 8px);
        text-shadow: none;
    }
    100% {
        opacity: 1;
        transform: translate(0, 0);
        text-shadow: 0 0 8px #00ff66;
    }
}

.hidden-message-line {
    opacity: 0;
    animation: softRevealDrift 2.2s ease-out forwards;
}
</style>
</head>

<body>

<!-- Ember edges -->
<div id="ember-edges"></div>

<!-- Terminal -->
<div id="terminal-wrapper">
    <div id="terminal"></div>
    <div id="cursor"></div>
</div>

<script>
/* --------------------------------------------------
   GLITCH MODE
-------------------------------------------------- */
const glitchChars = ["#", "%", "&", "@", "?", "!", "§", "¤", "▓", "░"];

/* --------------------------------------------------
   VOID SCRIPT
-------------------------------------------------- */
const script = [
    "BOOTING VOID NODE...",
    "SIGNAL LOST...",
    "RE-ESTABLISHING CONNECTION...",
    "",
    ">> Operator detected.",
    ">> The system remembers you.",
    ">> The dark remembers you.",
    "",
    "INITIALIZING MEMORY RECALL...",
    "STABILIZING REALITY ANCHORS...",
    "",
    ">> Proceed when ready."
];

/* --------------------------------------------------
   TYPEWRITER ENGINE
-------------------------------------------------- */
let line = 0;
let char = 0;
const speed = 70;
const linePause = 900;

function typeLine() {
    const terminal = document.getElementById("terminal");

    if (line < script.length) {
        if (char < script[line].length) {

            const isGlitch = Math.random() < 0.02;
            const realChar = script[line][char];
            const glitchChar = glitchChars[Math.floor(Math.random() * glitchChars.length)];

            terminal.innerHTML += isGlitch ? glitchChar : realChar;

            char++;
            setTimeout(typeLine, isGlitch ? speed / 2 : speed);

        } else {
            terminal.innerHTML += "\n";
            line++;
            char = 0;
            setTimeout(typeLine, linePause);
        }
    } else {
        revealHiddenMessage();
    }
}

setTimeout(typeLine, 2000);

/* --------------------------------------------------
   HIDDEN MESSAGE
-------------------------------------------------- */
function revealHiddenMessage() {
    const cursor = document.getElementById("cursor");
    cursor.style.display = "none";

    const lines = [
        "I miss you...",
        "missed you...",
        "or me...",
        "myself?"
    ];

    const container = document.createElement("div");
    container.classList.add("hidden-message-container");

    document.body.appendChild(container);

    lines.forEach((text, i) => {
        const line = document.createElement("div");
        line.classList.add("hidden-message-line");
        line.textContent = text;
        line.style.animationDelay = `${0.8 + i * 1.2}s`;
        container.appendChild(line);
    });
}

/* --------------------------------------------------
   EMBER SPARK GENERATOR
-------------------------------------------------- */
function spawnSpark() {
    const spark = document.createElement("div");
    spark.classList.add("spark");

    // Random start position
    spark.style.left = Math.random() * window.innerWidth + "px";
    spark.style.top = Math.random() * window.innerHeight + "px";

    // Random drift direction
    const dx = (Math.random() - 0.5) * 200;
    const dy = (Math.random() - 0.5) * 200;

    spark.style.setProperty("--dx", dx + "px");
    spark.style.setProperty("--dy", dy + "px");

    // Random duration (slow embers + fast sparks)
    spark.style.setProperty("--duration",
        (Math.random() * 3 + 2) + "s"
    );

    document.body.appendChild(spark);

    // Remove after animation
    setTimeout(() => spark.remove(), 5000);
}

// Spawn sparks continuously
setInterval(spawnSpark, 120);
</script>

</body>
</html>
