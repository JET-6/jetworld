<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE VOID</title>

<style>
/* --------------------------------------------------
   VOID BACKGROUND — pulsing hologram fog
-------------------------------------------------- */
body {
    margin: 0;
    background: #000;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "VT323", monospace;
    color: #00ff66;
    letter-spacing: 0.05em;
    animation: voidPulse 6s ease-in-out infinite;
    background: radial-gradient(circle at center,
        rgba(40,40,40,0.15) 0%,
        rgba(0,0,0,1) 80%
    );
    background-size: 200% 200%;
}

@keyframes voidPulse {
    0%   { background-size: 200% 200%; opacity: 0.95; }
    50%  { background-size: 230% 230%; opacity: 1; }
    100% { background-size: 200% 200%; opacity: 0.95; }
}

/* Subtle shimmer noise overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.08;
    animation: noisePulse 4s infinite alternate;
}

@keyframes noisePulse {
    from { opacity: 0.04; }
    to   { opacity: 0.10; }
}

/* --------------------------------------------------
   TERMINAL TEXT
-------------------------------------------------- */
#terminal-wrapper {
    display: block;
    width: 100%;
    max-width: 90%;
}

#terminal {
    display: block;
    font-size: 1.2rem;
    white-space: pre-wrap;
    line-height: 1.4;
    opacity: 0;
    animation: fadeIn 2s ease-out forwards;
    animation-delay: 1.5s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* Blinking cursor */
#cursor {
    display: block;       /* forces stacking */
    width: 12px;
    height: 1.2rem;
    background: #00ff66;
    margin-top: 0.2rem;
    animation: blink 1.2s infinite;
    opacity: 0;
    animation-delay: 2s;
    animation-fill-mode: forwards;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%,100% { opacity: 0; }
}

/* --------------------------------------------------
   Soft hidden message reveal
-------------------------------------------------- */
@keyframes softReveal {
    0% {
        opacity: 0;
        transform: translateY(6px);
        text-shadow: none;
    }
    100% {
        opacity: 1;
        transform: translateY(0);
        text-shadow: 0 0 6px #00ff66;
    }
}

.hidden-message-line {
    opacity: 0;
    animation: softReveal 1.8s ease-out forwards;
}
</style>
</head>

<body>

<div id="terminal-wrapper">
    <div id="terminal"></div>
    <div id="cursor"></div>
</div>

<script>
/* --------------------------------------------------
   GLITCH MODE
-------------------------------------------------- */
const glitchChars = ["#", "%", "&", "@", "?", "!", "§", "¤", "▓", "░"];

/* --------------------------------------------------
   EDITABLE VOID SCRIPT — slow & eerie
-------------------------------------------------- */
const script = [
    "BOOTING VOID NODE...",
    "SIGNAL LOST...",
    "RE-ESTABLISHING CONNECTION...",
    "",
    ">> Operator detected.",
    ">> The system remembers you.",
    ">> The dark remembers you.",
    "",
    "INITIALIZING MEMORY RECALL...",
    "STABILIZING REALITY ANCHORS...",
    "",
    ">> Proceed when ready."
];

/* --------------------------------------------------
   TYPEWRITER ENGINE — slow & eerie pacing
-------------------------------------------------- */
let line = 0;
let char = 0;
const speed = 70;
const linePause = 900;

function typeLine() {
    const terminal = document.getElementById("terminal");

    if (line < script.length) {
        if (char < script[line].length) {

            const isGlitch = Math.random() < 0.02;
            const realChar = script[line][char];
            const glitchChar = glitchChars[Math.floor(Math.random() * glitchChars.length)];

            terminal.innerHTML += isGlitch ? glitchChar : realChar;

            char++;
            setTimeout(typeLine, isGlitch ? speed / 2 : speed);

        } else {
            terminal.innerHTML += "\n";
            line++;
            char = 0;
            setTimeout(typeLine, linePause);
        }
    } else {
        revealHiddenMessage();
    }
}

setTimeout(typeLine, 2000);

/* --------------------------------------------------
   HIDDEN MESSAGE — soft reveal, stacked properly
-------------------------------------------------- */
function revealHiddenMessage() {
    const cursor = document.getElementById("cursor");
    cursor.style.display = "none";

    const lines = [
        "I miss you...",
        "missed you...",
        "or...",
        "myself?"
    ];

    const container = document.createElement("div");
    container.style.marginTop = "2rem";
    container.style.display = "flex";
    container.style.flexDirection = "column";
    container.style.gap = "0.4rem";
    container.style.fontSize = "1.3rem";
    container.style.letterSpacing = "0.08em";
    container.style.color = "#00ff66";

    document.getElementById("terminal-wrapper").insertAdjacentElement("afterend", container);

    lines.forEach((text, i) => {
        const line = document.createElement("div");
        line.classList.add("hidden-message-line");
        line.textContent = text;
        line.style.animationDelay = `${0.8 + i * 1.2}s`;
        container.appendChild(line);
    });
}
</script>

</body>
</html>
