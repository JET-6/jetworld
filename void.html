<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser jetzheart -->
    <link rel="icon" type="image/png" href="https://jet-6.github.io/wadayawant/jetzheart.png">

    <!-- iOS share preview icon -->
    <link rel="apple-touch-icon" href="https://jet-6.github.io/wadayawant/jetzheart.png">

    <!-- Open Graph -->
    <meta property="og:image" content="https://jet-6.github.io/wadayawant/jetzheart.png">
    <meta property="og:title" content="JETWORLD">
    <meta property="og:description" content="Enter the neon hologram terminal.">
    <meta property="og:url" content="https://jet-6.github.io/wadayawant/">
    <meta property="og:type" content="website">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://jet-6.github.io/wadayawant/jetzheart.png">


<title>THE fractured VOID</title>

<style>
/* --------------------------------------------------
   BASE BACKGROUND — breathing, shimmering, fractured
-------------------------------------------------- */
body {
    margin: 0;
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: "VT323", monospace;
    color: #00ff66;
    letter-spacing: 0.05em;

    animation:
        voidPulse 4.5s ease-in-out infinite,
        hologramBurn 6.5s ease-in-out infinite,
        purplePulse 7s ease-in-out infinite;

    background: radial-gradient(circle at center,
        rgba(0,255,102,0.12) 0%,
        rgba(0,0,0,1) 80%
    );
    background-size: 200% 200%;
    position: relative;
}

@keyframes voidPulse {
    0%   { background-size: 180% 180%; opacity: 0.9; }
    50%  { background-size: 230% 230%; opacity: 1; }
    100% { background-size: 180% 180%; opacity: 0.9; }
}

@keyframes hologramBurn {
    0%   { filter: brightness(1) contrast(1); }
    40%  { filter: brightness(1.1) contrast(1.2); }
    50%  { filter: brightness(0.85) contrast(1.4) saturate(1.4); }
    60%  { filter: brightness(1.15) contrast(1); }
    100% { filter: brightness(1) contrast(1); }
}

@keyframes purplePulse {
    0%   { box-shadow: inset 0 0 0 rgba(180,0,255,0.0); }
    40%  { box-shadow: inset 0 0 40px rgba(180,0,255,0.25); }
    50%  { box-shadow: inset 0 0 80px rgba(180,0,255,0.45); }
    60%  { box-shadow: inset 0 0 40px rgba(180,0,255,0.25); }
    100% { box-shadow: inset 0 0 0 rgba(180,0,255,0.0); }
}

/* --------------------------------------------------
   FRACTURED EDGES — green core, ember glow, purple tear
-------------------------------------------------- */
#fracture-edges {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;

    background:
        radial-gradient(circle at center,
            rgba(0,255,102,0.10),
            transparent 70%
        ),
        radial-gradient(circle at top left,
            rgba(255,120,0,0.28),
            transparent 60%
        ),
        radial-gradient(circle at top right,
            rgba(255,80,0,0.28),
            transparent 60%
        ),
        radial-gradient(circle at bottom left,
            rgba(255,60,0,0.28),
            transparent 60%
        ),
        radial-gradient(circle at bottom right,
            rgba(255,100,0,0.28),
            transparent 60%
        ),
        radial-gradient(circle at top left,
            rgba(180,0,255,0.35),
            transparent 70%
        ),
        radial-gradient(circle at bottom right,
            rgba(180,0,255,0.35),
            transparent 70%
        );
}

/* --------------------------------------------------
   SCROLL ZONES — dual consciousness
-------------------------------------------------- */
.scroll-zone {
    position: absolute;
    width: 60vw;
    height: 45vh;
    overflow-y: hidden;
    padding: 1rem;
    z-index: 10;
}

/* Terminal (mind) — center-left */
#terminal-scroll {
    top: 10vh;
    left: 5vw;
}

/* Soul (hidden voice) — lower-right */
#soul-scroll {
    bottom: 5vh;
    right: 5vw;
    width: 30vw;
    height: 35vh;
    filter: drop-shadow(0 0 6px rgba(180,0,255,0.6));
}

/* --------------------------------------------------
   CHAOTIC SPARKS — orange + purple trails
-------------------------------------------------- */
.spark {
    position: fixed;
    width: 3px;
    height: 3px;
    background: rgba(255,140,0,0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 7;
    filter: blur(1px);
    animation: drift var(--duration) linear infinite;
}

.spark::after {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(180,0,255,0.5);
    border-radius: 50%;
    filter: blur(4px);
    top: -2px;
    left: -2px;
    opacity: 0.7;
}

@keyframes drift {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.4); opacity: 0; }
}

/* --------------------------------------------------
   TEXT STYLES
-------------------------------------------------- */
#terminal, #soul {
    white-space: pre-wrap;
    font-size: 1.1rem;
    line-height: 1.4;
}
</style>
</head>

<body>

<div id="fracture-edges"></div>

<!-- Terminal (mind) -->
<div id="terminal-scroll" class="scroll-zone">
    <div id="terminal"></div>
</div>

<!-- Soul (hidden voice) -->
<div id="soul-scroll" class="scroll-zone">
    <div id="soul"></div>
</div>

<script>
/* --------------------------------------------------
   TERMINAL SCRIPT (mind)
-------------------------------------------------- */
const terminalLines = [
    "BOOTING VOID NODE...",
    "SIGNAL LOST...",
    "RE-ESTABLISHING CONNECTION...",
    "",
    ">> Operator detected.",
    ">> Running diagnostics...",
    ">> Memory sectors unstable.",
    ">> Emotional interference detected.",
    "",
    "INITIALIZING RECALL SUBSYSTEM...",
    "STABILIZING REALITY ANCHORS...",
    "",
    ">> Proceed when ready."
];

let tIndex = 0;

function addTerminalLine() {
    const terminal = document.getElementById("terminal");
    const scroll = document.getElementById("terminal-scroll");

    terminal.innerHTML += terminalLines[tIndex] + "\n";
    scroll.scrollTop = scroll.scrollHeight;

    tIndex++;
    if (tIndex < terminalLines.length) {
        setTimeout(addTerminalLine, 900);
    } else {
        setTimeout(addSoulBurst, 1500);
    }
}

setTimeout(addTerminalLine, 1200);

/* --------------------------------------------------
   SOUL SCRIPT (hidden voice)
-------------------------------------------------- */
const soulBursts = [
    ["I miss you...", "missed you...", "or me...", "myself?"],
    ["Why does it hurt to remember?", "Why does it hurt not to?"],
    ["I'm trying...", "I think you are too."],
    ["Are we breaking?", "Or becoming?"]
];

let sIndex = 0;

function addSoulBurst() {
    const soul = document.getElementById("soul");
    const scroll = document.getElementById("soul-scroll");

    const burst = soulBursts[sIndex];
    burst.forEach(line => {
        soul.innerHTML += line + "\n";
    });

    scroll.scrollTop = scroll.scrollHeight;

    sIndex++;
    if (sIndex < soulBursts.length) {
        setTimeout(addSoulBurst, 4000);
    }
}

/* --------------------------------------------------
   CHAOTIC SPARK GENERATOR
-------------------------------------------------- */
function spawnSpark() {
    const spark = document.createElement("div");
    spark.classList.add("spark");

    spark.style.left = Math.random() * window.innerWidth + "px";
    spark.style.top = Math.random() * window.innerHeight + "px";

    const dx = (Math.random() - 0.5) * 300;
    const dy = (Math.random() - 0.5) * 300;

    spark.style.setProperty("--dx", dx + "px");
    spark.style.setProperty("--dy", dy + "px");

    spark.style.setProperty("--duration",
        (Math.random() * 2 + 1.5) + "s"
    );

    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 5000);
}

setInterval(spawnSpark, 90);
</script>

</body>
</html>
