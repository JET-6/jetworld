<style>
body {
    margin: 0;
    background: #fdf7e2;
    height: 100vh;
    overflow: hidden;
    font-family: "Courier New", monospace;
    color: #333;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeIn 2.5s ease;
}

@keyframes fadeIn {
    0% { opacity: 0; filter: blur(6px); }
    100% { opacity: 1; filter: blur(0); }
}

/* Stage: single-screen theatre */
#stage {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#ascii-scene {
    white-space: pre;
    text-align: center;
    font-size: 1.1rem;
    line-height: 1.4;
    color: #444;
    min-height: 7em;
    display: inline-block;
    animation: breathe 6s ease-in-out infinite, flicker 2.8s ease-in-out infinite;
}

@keyframes breathe {
    0% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
    100% { transform: translateY(0); }
}

@keyframes flicker {
    0% { opacity: 0.96; }
    50% { opacity: 1; }
    100% { opacity: 0.96; }
}

/* Narration ribbon at bottom */
#narration-wrapper {
    width: 100%;
    border-top: 1px solid rgba(0,0,0,0.1);
    background: rgba(255, 248, 225, 0.95);
    overflow: hidden;
    padding: 0.3rem 0;
}

#narration {
    white-space: nowrap;
    display: inline-block;
    padding-left: 100%;
    animation: marquee 22s linear infinite;
    font-size: 0.9rem;
    color: #555;
}

@keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>
