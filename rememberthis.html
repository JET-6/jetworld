<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>remember this</title>

<style>
body {
    margin: 0;
    background: #fdf7e2;
    height: 100vh;
    overflow: hidden;
    font-family: "Courier New", monospace;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 2.5s ease;
}

@keyframes fadeIn {
    0% { opacity: 0; filter: blur(6px); }
    100% { opacity: 1; filter: blur(0); }
}

#memory-container {
    width: 90vw;
    height: 90vh;
    padding: 1rem;
    overflow-y: hidden;
    white-space: pre;
    font-size: 1.1rem;
    line-height: 1.4;
    color: #444;
}

/* Cinematic frame appearance */
.ascii-frame {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 2s ease, transform 2s ease;
}

.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Gentle character animation */
.wiggle {
    animation: wiggle 0.6s ease-in-out infinite alternate;
}

@keyframes wiggle {
    0% { transform: translateX(0); }
    100% { transform: translateX(2px); }
}
</style>
</head>

<body>

<div id="memory-container"></div>

<script>
/* --------------------------------------------------
   ASCII FLASHBACK — PURE JOY (Animated)
-------------------------------------------------- */

/* Each frame has two versions for character motion */
const frames = [

[
`  \\\\o    o////
     |    |
    / \\  / \\

Two figures running.`,

`  \\\\o    o////
     |    |
    /  \\ /  \\

Two figures running.`
],

[
`   \\o/      \\o/
    ( )      ( )
    / \\      / \\

They laugh as they run.`,

`   \\o/      \\o/
    ( )      ( )
    /  \\    /  \\

They laugh as they run.`
],

[
`   \\o_      _o/
     ( )    ( )
    / >\\    /< \\

They dance in circles.`,

`   \\o_      _o/
     ( )    ( )
    /  >\\  /<  \\

They dance in circles.`
],

[
`   \\o/   \\o/   \\o/   \\o/
    ( )   ( )   ( )   ( )
    / \\   / \\   / \\   / \\

And then there were four.`,

`   \\o/   \\o/   \\o/   \\o/
    ( )   ( )   ( )   ( )
    /  \\  /  \\  /  \\  /  \\

And then there were four.`
],

[
`   \\o/   \\o/   \\o/   \\o/
  ~ ( ) ~ ( ) ~ ( ) ~ ( ) ~
    / \\   / \\   / \\   / \\

Joy multiplying.`,

`   \\o/   \\o/   \\o/   \\o/
  ~ ( ) ~ ( ) ~ ( ) ~ ( ) ~
    /  \\  /  \\  /  \\  /  \\

Joy multiplying.`
],

[
`   \\o/   \\o/   \\o/   \\o/
    ( )   ( )   ( )   ( )
 ~~/ \\~~~ / \\~~~ / \\~~~ / \\~~

A memory glowing.`,

`   \\o/   \\o/   \\o/   \\o/
    ( )   ( )   ( )   ( )
 ~~/  \\~~ /  \\~~ /  \\~~ /  \\~~

A memory glowing.`
],

[
[`remember this.`,
 `you were happy here.`].join("\n")
]

];

let index = 0;
const container = document.getElementById("memory-container");

function showNextFrame() {
    if (index >= frames.length) return;

    const frameSet = frames[index];

    // Create frame element
    const frame = document.createElement("div");
    frame.classList.add("ascii-frame", "wiggle");
    frame.textContent = frameSet[0];
    container.appendChild(frame);

    // Fade + slide in
    setTimeout(() => frame.classList.add("visible"), 100);

    // Auto-scroll
    container.scrollTop = container.scrollHeight;

    // If this frame has animation versions, alternate them
    if (frameSet.length > 1) {
        let toggle = false;
        setInterval(() => {
            frame.textContent = frameSet[toggle ? 0 : 1];
            toggle = !toggle;
        }, 500);
    }

    index++;
    setTimeout(showNextFrame, 3000);
}

setTimeout(showNextFrame, 1200);

</script>

</body>
</html>
